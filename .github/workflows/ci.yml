# Complete deterministic repository gate. Timing remains outside CI because host
# noise is not performance evidence; random-seed discovery remains a separate
# campaign, while fixed-seed integration coverage belongs in `make test`.
#
# Reliability over speed for now: a cold `docker build` of the pinned GraalVM
# image each run (no GHA layer cache yet). Only the content-pinned javac reproduces the
# golden bytes, so the correctness portion builds and runs inside that image.
# Add layer caching later only if the cold build's runtime hurts.
name: deterministic-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1" # the Dockerfile uses `RUN --mount=type=cache`
    steps:
      - uses: actions/checkout@v4
      - name: deterministic repository test suite (in Docker)
        run: make test
